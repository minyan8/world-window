name: Update News Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: world-window-news-update
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch official news data
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: node scripts/fetch-gnews.mjs

      - name: Commit updated news data
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No news data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "Update official news data"
          git push
